<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}FlowSurgeon{% endblock %}</title>
  <link rel="icon" type="image/png" href="{{ debug_route }}/_static/logo_flowsurgeon.png">
  <script src="{{ debug_route }}/_static/alpine.min.js" defer></script>
  <style>
    [x-cloak] { display: none !important; }

    /* ── Design Tokens ── */
    :root {
      /* ── Primitives ── */
      --color-gray-950: #0D0F12;
      --color-gray-900: #131720;
      --color-gray-850: #161A22;
      --color-gray-800: #0D1117;
      --color-gray-700: #1E2328;
      --color-gray-500: #4B5563;
      --color-gray-400: #6B7280;
      --color-gray-300: #9CA3AF;
      --color-gray-100: #E5E7EB;
      --color-white:    #FFFFFF;

      --color-brand:    #00D4AA;

      /* Method badge colors (Swagger convention — solid bg, white text) */
      --color-method-get-bg:    #61AFFE;
      --color-method-get-fg:    #FFFFFF;
      --color-method-post-bg:   #49CC90;
      --color-method-post-fg:   #FFFFFF;
      --color-method-put-bg:    #FCA130;
      --color-method-put-fg:    #FFFFFF;
      --color-method-delete-bg: #F93E3E;
      --color-method-delete-fg: #FFFFFF;
      --color-method-patch-bg:  #50E3C2;
      --color-method-patch-fg:  #FFFFFF;
      --color-method-head-bg:   #9012FE;
      --color-method-head-fg:   #FFFFFF;

      /* Status badge colors */
      --color-status-2xx-bg:    #1a3b2a;
      --color-status-2xx-fg:    #34D399;
      --color-status-3xx-bg:    #3b2a1a;
      --color-status-3xx-fg:    #FB923C;
      --color-status-4xx-bg:    #3b2a1a;
      --color-status-4xx-fg:    #FB923C;
      --color-status-5xx-bg:    #3b1a1a;
      --color-status-5xx-fg:    #F87171;

      /* Duration colors */
      --color-dur-fast:   #34D399;
      --color-dur-medium: #FB923C;
      --color-dur-slow:   #F87171;

      /* ── Semantic tokens ── */
      --bg-base:      var(--color-gray-950);
      --bg-surface:   var(--color-gray-900);
      --bg-elevated:  var(--color-gray-850);
      --bg-sunken:    var(--color-gray-800);
      --border-color: var(--color-gray-700);

      --text-primary:  var(--color-white);
      --text-body:     var(--color-gray-100);
      --text-muted:    var(--color-gray-300);
      --text-dim:      var(--color-gray-400);
      --text-faint:    var(--color-gray-500);
      --text-brand:    var(--color-brand);

      /* ── Spacing scale ── */
      --space-1:  4px;
      --space-2:  8px;
      --space-3:  12px;
      --space-4:  16px;
      --space-5:  20px;
      --space-6:  24px;
      --space-7:  32px;
      --space-8:  48px;

      /* ── Radii ── */
      --radius-sm:   4px;
      --radius-md:   8px;
      --radius-lg:   12px;
      --radius-pill: 999px;

      /* ── Typography ── */
      --font-sans: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;

      /* ── Transitions ── */
      --transition-fast: 0.12s ease;
      --transition-base: 0.15s ease;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    code { font-family: var(--font-mono); }

    body {
      font-family: var(--font-sans);
      background: var(--bg-base);
      color: var(--text-body);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
      transition: color var(--transition-base);
    }

    /* ── Topbar ── */
    .topbar {
      height: 64px;
      background: var(--bg-surface);
      display: flex;
      align-items: center;
      gap: var(--space-7);
      padding: 0 var(--space-7);
      flex-shrink: 0;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-brand);
    }

    .nav-item {
      height: 64px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      text-decoration: none;
    }

    .nav-item span {
      font-size: 14px;
    }

    .nav-item.active span {
      color: var(--text-primary);
      font-weight: 600;
    }

    .nav-item.inactive span {
      color: var(--text-dim);
      transition: color var(--transition-base);
    }

    .nav-item.inactive:hover span {
      color: var(--text-muted);
    }

    .nav-underline {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      border-radius: 2px 2px 0 0;
      background: var(--color-brand);
    }

    /* ── Breadcrumb topbar ── */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: 14px;
    }

    .breadcrumb .bc-sep {
      color: var(--text-faint);
    }

    .breadcrumb .b-dim {
      color: var(--text-dim);
    }

    .breadcrumb .b-mid {
      color: var(--text-body);
      font-weight: 600;
    }

    .breadcrumb .b-cur {
      color: var(--text-brand);
      font-weight: 600;
    }

    /* ── Sub-nav ── */
    .subnav {
      height: 48px;
      background: var(--bg-surface);
      display: flex;
      align-items: center;
      padding: 0 var(--space-8);
      border-top: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .subnav-item {
      height: 48px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 var(--space-5);
      position: relative;
      text-decoration: none;
    }

    .subnav-item span {
      font-size: 13px;
    }

    .subnav-item.active span {
      color: var(--text-primary);
      font-weight: 600;
    }

    .subnav-item.inactive span {
      color: var(--text-dim);
      transition: color var(--transition-base);
    }

    .subnav-item.inactive:hover span {
      color: var(--text-muted);
    }

    .subnav-underline {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      border-radius: 2px 2px 0 0;
      background: var(--color-brand);
    }

    /* ── Content ── */
    .content {
      padding: var(--space-4) var(--space-6);
      display: flex;
      flex-direction: column;
      gap: var(--space-6);
      flex: 1;
      overflow: hidden;
    }

    /* ── Section header ── */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .section-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .stat-badge {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      background: var(--bg-elevated);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 6px 14px;
    }

    .stat-badge .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color-dur-fast);
    }

    .stat-badge span {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
    }

    /* ── Table ── */
    .table-wrap {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      overflow: hidden;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .tbl-head {
      height: 48px;
      background: var(--bg-sunken);
      display: flex;
      align-items: center;
      padding: 0 var(--space-6);
      flex-shrink: 0;
    }

    .tbl-body {
      overflow-y: auto;
      flex: 1;
    }

    .th {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    .tr {
      height: 40px;
      display: flex;
      align-items: center;
      padding: 0 var(--space-6);
      border-bottom: 1px solid var(--border-color);
      transition: background var(--transition-fast);
    }

    .tr:last-child {
      border-bottom: none;
    }

    .tr-req {
      height: 40px;
    }

    .tr:hover {
      background: var(--bg-elevated);
    }

    .sep {
      height: 1px;
      background: var(--border-color);
    }

    .td {
      font-size: 13px;
      color: var(--text-body);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .td-dim {
      font-size: 12px;
      color: var(--text-dim);
    }

    .td-link:hover {
      color: var(--text-brand);
    }

    /* ── Column widths ── */
    .w-70 {
      flex: 0 0 70px;
    }

    .w-80 {
      flex: 0 0 80px;
    }

    .w-90 {
      flex: 0 0 90px;
    }

    .w-100 {
      flex: 0 0 100px;
    }

    .w-110 {
      flex: 0 0 110px;
    }

    .w-120 {
      flex: 0 0 120px;
    }

    .w-160 {
      flex: 0 0 160px;
    }

    .w-fill {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Method badge ── */
    .method {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-pill);
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 700;
    }

    .m-GET {
      background: var(--color-method-get-bg);
      color: var(--color-method-get-fg);
    }

    .m-POST {
      background: var(--color-method-post-bg);
      color: var(--color-method-post-fg);
    }

    .m-PUT {
      background: var(--color-method-put-bg);
      color: var(--color-method-put-fg);
    }

    .m-PATCH {
      background: var(--color-method-patch-bg);
      color: var(--color-method-patch-fg);
    }

    .m-DELETE {
      background: var(--color-method-delete-bg);
      color: var(--color-method-delete-fg);
    }

    .m-HEAD {
      background: var(--color-method-head-bg);
      color: var(--color-method-head-fg);
    }

    .m-OTHER {
      background: var(--color-method-head-bg);
      color: var(--color-method-head-fg);
    }

    /* ── Status badge ── */
    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-pill);
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 700;
    }

    .s-2xx {
      background: var(--color-status-2xx-bg);
      color: var(--color-status-2xx-fg);
    }

    .s-3xx {
      background: var(--color-status-3xx-bg);
      color: var(--color-status-3xx-fg);
    }

    .s-4xx {
      background: var(--color-status-4xx-bg);
      color: var(--color-status-4xx-fg);
    }

    .s-5xx {
      background: var(--color-status-5xx-bg);
      color: var(--color-status-5xx-fg);
    }

    .s-err {
      background: var(--color-status-5xx-bg);
      color: var(--color-status-5xx-fg);
    }

    /* ── Duration color ── */
    .dur-fast {
      color: var(--color-dur-fast);
      font-weight: 600;
    }

    .dur-medium {
      color: var(--color-dur-medium);
      font-weight: 600;
    }

    .dur-slow {
      color: var(--color-dur-slow);
      font-weight: 600;
    }

    /* ── Stat cards (detail) ── */
    .cards-row {
      display: flex;
      gap: var(--space-4);
      flex-shrink: 0;
    }

    .card {
      flex: 1;
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .card-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .card-value {
      font-size: 24px;
      font-weight: 700;
    }

    .card-badge {
      display: inline-flex;
      align-items: center;
      border-radius: var(--radius-md);
      padding: 4px 12px;
    }

    .card-badge span {
      font-size: 16px;
      font-weight: 700;
    }

    /* ── Label/value typographic hierarchy ── */
    .label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .value {
      color: var(--text-body);
      font-weight: 500;
    }

    .value-prominent {
      color: var(--text-primary);
      font-weight: 700;
    }

    /* ── Detail panels ── */
    .panels-row {
      display: flex;
      gap: var(--space-4);
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .panel-card {
      flex: 1;
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .panel-hd {
      background: var(--bg-sunken);
      padding: 14px var(--space-5);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .panel-hd-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .panel-bd {
      padding: var(--space-5);
      overflow-y: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
    }

    .field-lbl {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
    }

    .field-val {
      font-size: 13px;
      color: var(--text-body);
    }

    .code-block {
      background: var(--bg-sunken);
      border-radius: var(--radius-md);
      padding: var(--space-3);
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
    }

    .code-line {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-muted);
      white-space: pre-wrap;
      word-break: break-all;
    }

    .code-line.err {
      color: var(--color-dur-slow);
    }

    .psep {
      height: 1px;
      background: var(--border-color);
    }

    /* ── SQL query list ── */
    .query-item {
      padding: var(--space-4) 0;
      border-bottom: 1px solid var(--border-color);
    }

    .query-item:last-child {
      border-bottom: none;
    }

    .query-meta {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .query-num {
      font-size: 11px;
      color: var(--text-dim);
      font-weight: 600;
      min-width: 28px;
    }

    .query-sql {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-body);
      background: var(--bg-sunken);
      border-radius: var(--radius-md);
      padding: 10px var(--space-3);
      margin-top: var(--space-2);
      white-space: pre-wrap;
      word-break: break-all;
    }

    .query-detail {
      display: flex;
      gap: var(--space-4);
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .badge-slow {
      background: var(--color-status-5xx-bg);
      color: var(--color-status-5xx-fg);
      border-radius: var(--radius-sm);
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
    }

    .badge-dup {
      background: var(--color-status-4xx-bg);
      color: var(--color-status-4xx-fg);
      border-radius: var(--radius-sm);
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
    }

    /* ── Traceback ── */
    .traceback {
      background: var(--bg-sunken);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-muted);
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.6;
      overflow-y: auto;
      flex: 1;
    }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .filter-input {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: var(--space-2) 14px;
      font-size: 13px;
      font-family: var(--font-sans);
      color: var(--text-body);
      outline: none;
      transition: border-color var(--transition-base), box-shadow var(--transition-base);
    }

    .filter-input:focus {
      border-color: var(--color-brand);
      box-shadow: 0 0 0 2px rgba(0, 212, 170, 0.12);
    }

    .filter-select {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: var(--space-2) 14px;
      font-size: 13px;
      font-family: var(--font-sans);
      color: var(--text-body);
      outline: none;
      cursor: pointer;
      transition: border-color var(--transition-base), box-shadow var(--transition-base);
    }

    .filter-select:focus {
      border-color: var(--color-brand);
      box-shadow: 0 0 0 2px rgba(0, 212, 170, 0.12);
    }

    .filter-btn {
      background: var(--color-brand);
      color: var(--bg-base);
      border: none;
      border-radius: var(--radius-md);
      padding: var(--space-2) var(--space-5);
      font-size: 13px;
      font-family: var(--font-sans);
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition-base);
    }

    .filter-btn:hover {
      background: #00BFA0;
    }

    .filter-clear {
      font-size: 13px;
      color: var(--text-dim);
    }

    .filter-clear:hover {
      color: var(--text-muted);
    }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: var(--space-2);
      flex-shrink: 0;
      padding: var(--space-2) 0;
    }

    .page-btn {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 6px 14px;
      font-size: 13px;
      color: var(--text-body);
      text-decoration: none;
      transition: border-color var(--transition-base), color var(--transition-base);
    }

    .page-btn:hover {
      border-color: var(--color-brand);
      color: var(--text-brand);
    }

    .page-info {
      font-size: 13px;
      color: var(--text-dim);
    }

    /* ── Sort header link ── */
    .th-link {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .th-link:hover {
      color: var(--text-body);
    }

    .th-link.active {
      color: var(--text-brand);
    }

    /* ── Empty state ── */
    .empty {
      padding: var(--space-8);
      text-align: center;
      color: var(--text-dim);
      font-size: 14px;
    }

    /* ── Controls row ── */
    .controls-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      gap: var(--space-4);
      padding: 0 var(--space-4);
    }

    .controls-row-inner {
      display: flex;
      align-items: center;
      gap: var(--space-4);
    }

    /* ── Tab buttons ── */
    .tab-btns {
      display: flex;
      gap: 2px;
      align-items: center;
    }

    .tab-btn {
      display: flex;
      align-items: center;
      padding: var(--space-2) var(--space-4);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
      background: var(--bg-surface);
      border-radius: var(--radius-md);
      text-decoration: none;
      transition: color var(--transition-base), background var(--transition-base);
    }

    .tab-btn:hover {
      color: var(--text-body);
    }

    .tab-btn-active {
      color: var(--text-primary);
      font-weight: 600;
      background: var(--bg-base);
      box-shadow: inset 0 -2px 0 var(--color-brand);
    }

    /* ── Filter right ── */
    .filter-right {
      display: flex;
      gap: var(--space-2);
      align-items: center;
      flex-shrink: 0;
    }

    .filter-label {
      font-size: 13px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    /* ── Request card grid ── */
    .req-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: var(--space-3);
      flex: 1;
      overflow-y: auto;
      align-content: start;
    }

    .req-card {
      background: var(--bg-surface);
      border-radius: 10px;
      border: 1px solid var(--border-color);
      padding: 14px var(--space-4);
      display: flex;
      flex-direction: column;
      gap: 6px;
      text-decoration: none;
      cursor: pointer;
      transition: border-color var(--transition-base);
    }

    .req-card:hover {
      border-color: var(--color-brand);
    }

    .req-card-top {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    /* Card status: text color only (no badge background) */
    .cs-2xx { color: #C8D6E5; font-size: 18px; font-weight: 700; }
    .cs-3xx { color: var(--color-dur-medium); font-size: 18px; font-weight: 700; }
    .cs-4xx { color: var(--color-dur-medium); font-size: 18px; font-weight: 700; }
    .cs-5xx { color: var(--color-dur-slow); font-size: 18px; font-weight: 700; }

    /* Card method: text color only */
    .cm-GET    { color: var(--color-method-get-fg); font-size: 13px; font-weight: 600; }
    .cm-POST   { color: var(--color-method-post-fg); font-size: 13px; font-weight: 600; }
    .cm-PUT    { color: var(--color-method-put-fg); font-size: 13px; font-weight: 600; }
    .cm-PATCH  { color: var(--color-method-patch-fg); font-size: 13px; font-weight: 600; }
    .cm-DELETE { color: var(--color-method-delete-fg); font-size: 13px; font-weight: 600; }
    .cm-HEAD   { color: var(--color-method-head-fg); font-size: 13px; font-weight: 600; }
    .cm-OTHER  { color: var(--color-method-head-fg); font-size: 13px; font-weight: 600; }

    .req-path {
      font-size: 12px;
      color: var(--text-faint);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .req-dur {
      font-size: 13px;
      font-weight: 500;
    }

    .req-qinfo {
      font-size: 12px;
      color: var(--color-dur-medium);
    }

    /* ── Profiling placeholder ── */
    .profiling-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-4);
    }

    .profiling-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-dim);
    }

    .profiling-sub {
      font-size: 14px;
      color: var(--text-faint);
    }

    /* ── Pagination row ── */
    .pagination-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    /* ── SPA layout helpers ── */
    .spa-wrapper {
      display: flex;
      flex-direction: column;
      gap: var(--space-6);
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* Flex-column wrapper for each tab panel */
    .tab-panel {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #313244;
      border-radius: 3px;
    }

    /* ── Utility classes ── */

    /* Monospace */
    .u-mono { font-family: var(--font-mono); }

    /* Font sizes */
    .u-text-xs   { font-size: 11px; }
    .u-text-sm   { font-size: 12px; }
    .u-text-md   { font-size: 13px; }
    .u-text-base { font-size: 14px; }
    .u-text-lg   { font-size: 20px; }

    /* Colors */
    .u-muted  { color: var(--text-muted); }
    .u-dim    { color: var(--text-dim); }
    .u-faint  { color: var(--text-faint); }
    .u-brand  { color: var(--text-brand); }
    .u-bright { color: var(--text-primary); }

    /* Layout */
    .u-flex         { display: flex; }
    .u-flex-col     { display: flex; flex-direction: column; }
    .u-items-center { align-items: center; }
    .u-gap-1        { gap: var(--space-1); }
    .u-gap-2        { gap: var(--space-2); }
    .u-gap-3        { gap: var(--space-3); }
    .u-gap-4        { gap: var(--space-4); }
    .u-flex-1       { flex: 1; }
    .u-shrink-0     { flex-shrink: 0; }
    .u-min-h-0      { min-height: 0; }

    /* Overflow */
    .u-scroll-y { overflow-y: auto; }

    /* Display: none helper (complement to x-cloak) */
    .u-hidden { display: none; }

    /* Text alignment */
    .u-text-right { text-align: right; }

    /* Font weight */
    .u-fw-500 { font-weight: 500; }
    .u-fw-600 { font-weight: 600; }
    .u-fw-700 { font-weight: 700; }

    /* Display: block */
    .u-block { display: block; }

    /* Margin-top micro */
    .u-mt-1 { margin-top: var(--space-1); }
    .u-mt-2 { margin-top: var(--space-2); }

    /* ── Profile tab component classes ── */
    .profile-header {
      display: flex;
      gap: var(--space-4);
      align-items: center;
      flex-shrink: 0;
    }

    .profile-grid {
      display: grid;
      grid-template-columns: 1fr 80px 90px 90px 160px;
      gap: 0;
      padding: 0 var(--space-6);
    }

    .profile-th {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      padding: 10px 8px;
      border-bottom: 1px solid var(--border-color);
    }

    .profile-th-first {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      padding: 10px 8px 10px 0;
      border-bottom: 1px solid var(--border-color);
    }

    .profile-th-last {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      padding: 10px 0 10px 12px;
      border-bottom: 1px solid var(--border-color);
    }

    .profile-cell {
      padding: 10px 8px 4px;
      border-bottom: 1px solid var(--border-color);
    }

    .profile-cell-right {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-muted);
      padding: 10px 8px 4px;
      text-align: right;
      border-bottom: 1px solid var(--border-color);
    }

    .profile-cell-num {
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 10px 8px 4px;
      text-align: right;
      border-bottom: 1px solid var(--border-color);
    }

    .profile-cell-first {
      padding: 10px 8px 4px 0;
    }

    .profile-cell-bar {
      padding: 10px 0 4px 12px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
    }

    .profile-func {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-body);
      font-weight: 500;
    }

    .profile-file {
      display: block;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-faint);
      margin-top: 2px;
    }

    .profile-callers-toggle {
      margin-top: 6px;
    }

    .profile-callers-summary {
      font-size: 11px;
      color: var(--text-dim);
      cursor: pointer;
      list-style: none;
      user-select: none;
      outline: none;
    }

    .profile-callers-arrow {
      color: var(--text-faint);
    }

    .profile-callers-list {
      padding: 6px 0 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      border-left: 2px solid var(--border-color);
      margin-top: 4px;
    }

    .profile-caller-item {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
    }

    .profile-caller-file {
      color: var(--text-faint);
    }

    .profile-caller-time {
      color: var(--text-dim);
    }

    .profile-bar-track {
      width: 100%;
      background: var(--border-color);
      border-radius: 3px;
      height: 8px;
      overflow: hidden;
    }

    .profile-bar-fill {
      height: 8px;
      background: var(--color-brand);
      border-radius: 3px;
      opacity: 0.8;
    }

    /* ── SQL tab component classes ── */
    .sql-header {
      display: flex;
      gap: var(--space-4);
      align-items: center;
      flex-shrink: 0;
    }

    .sql-tbl-body {
      padding: 0 var(--space-6);
    }

    /* stat-badge padding override for tab headers */
    .stat-badge-sm {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      background: var(--bg-elevated);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 4px 12px;
    }

    /* ── Traceback tab component classes ── */
    .trace-header {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      flex-shrink: 0;
    }

    .trace-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      overflow-y: auto;
      flex: 1;
      min-height: 0;
    }

    .trace-item {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .trace-meta {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* filter-input width variants */
    .filter-input-path   { width: 240px; }
    .filter-input-show   { width: 72px; }
    .filter-input-order  { width: 160px; }

    /* tab-btns margin variant */
    .tab-btns-ml { margin-left: 8px; }

    /* path td font size */
    .td-path { font-size: 12px; }

    /* card-badge margin-top variant */
    .card-badge-mt { margin-top: 4px; }

    /* code-line faint */
    .code-line-faint { color: var(--text-faint); }

    /* field-val monospace */
    .field-val-mono {
      font-family: var(--font-mono);
      font-size: 12px;
    }

    /* code-block scrollable */
    .code-block-scroll {
      max-height: 300px;
      overflow-y: auto;
    }

    /* ── Toggle group -- */
    .toggle-group {
      display: inline-flex;
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 4px;
      gap: 2px;
    }

    .toggle-item {
      background: transparent;
      border: none;
      border-radius: var(--radius-sm);
      padding: 4px var(--space-4);
      font-size: 13px;
      font-weight: 400;
      color: var(--text-dim);
      cursor: pointer;
      font-family: var(--font-sans);
      transition: background var(--transition-fast), color var(--transition-fast);
    }

    .toggle-item:hover {
      background: var(--bg-elevated);
      color: var(--text-body);
    }

    .toggle-item-active {
      background: var(--bg-elevated);
      color: var(--text-primary);
      font-weight: 600;
    }

    /* ── Route group header ── */
    .route-group-hd { padding: var(--space-2) var(--space-4); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); background: var(--bg-sunken); border-bottom: 1px solid var(--border-color); }

    /* ── No-traffic row ── */
    .tr-no-traffic { opacity: 0.6; }
    .method-muted { opacity: 0.45; }

    /* ── Route row layout helpers ── */
    .td-path { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .td-stats { display: flex; gap: var(--space-3); align-items: center; justify-content: flex-end; margin-left: auto; }

    /* -- Light mode -- */
    @media (prefers-color-scheme: light) {
      :root {
        --bg-base:      #FFFFFF;
        --bg-surface:   #F8F9FA;
        --bg-elevated:  #F1F3F5;
        --bg-sunken:    #EBEDF0;
        --border-color: #DEE2E6;

        --text-primary: #0D0F12;
        --text-body:    #1C1E21;
        --text-muted:   #495057;
        --text-dim:     #6C757D;
        --text-faint:   #ADB5BD;
        --text-brand:   #00A884;

        --color-status-2xx-bg: #D1FAE5;
        --color-status-2xx-fg: #065F46;
        --color-status-3xx-bg: #FEF3C7;
        --color-status-3xx-fg: #92400E;
        --color-status-4xx-bg: #FEF3C7;
        --color-status-4xx-fg: #92400E;
        --color-status-5xx-bg: #FEE2E2;
        --color-status-5xx-fg: #991B1B;

        --color-dur-fast:   #059669;
        --color-dur-medium: #D97706;
        --color-dur-slow:   #DC2626;
      }

      ::-webkit-scrollbar-thumb {
        background: #CED4DA;
      }
    }
  </style>
</head>

<body {% block body_attrs %}{% endblock %}>
  {% block topbar %}{% endblock %}
  {% block subnav %}{% endblock %}
  <main class="content">
    {% block content %}{% endblock %}
  </main>
</body>

</html>
